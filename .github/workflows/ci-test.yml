name: Test
on:
  pull_request:
  push:
    branches:
      - main
jobs:
  typecheck-web:
    name: Typecheck (web)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Typecheck
        working-directory: apps/web
        run: bun run typecheck
