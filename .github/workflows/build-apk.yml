name: Build Android APK
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-apk:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web app
        working-directory: apps/web
        env:
          VITE_CONVEX_URL: ${{ secrets.VITE_CONVEX_URL }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
        run: bun run build

      - name: Sync Capacitor (copy web assets into android/)
        working-directory: apps/web
        run: bunx cap sync android

      - name: Point Gradle to Android SDK
        working-directory: apps/web/android
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Make gradlew executable
        working-directory: apps/web/android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: apps/web/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: khata-debug-${{ github.sha }}
          path: apps/web/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
